<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#100d1b"><title>DreamLingo — Sleep English</title><meta name="description" content="在睡前，用温柔的 posh 英式英语陪你自然入睡。"><link rel="icon" href="public/favicon.svg"><style>
:root{--ink:#f5f2fa;--muted:#aaa4bd;--lav:#b9a7e8;--panel:rgba(255,255,255,.055)}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 20% 0,#26203c 0,transparent 38%),linear-gradient(180deg,#100d1b,#090811);font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}button,input{font:inherit}button{color:inherit}.shell{min-height:100vh;max-width:480px;margin:auto;padding:28px 22px 50px;overflow:hidden;position:relative}.aurora{position:absolute;width:250px;height:250px;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none}.a1{background:#9d76ff;top:150px;right:-160px}.a2{background:#65c8e8;top:440px;left:-180px}header{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}.eye{margin:0 0 4px;color:#8e89a1;font-size:10px;font-weight:700;letter-spacing:.22em}h1,h2,h3{font-family:Georgia,serif;font-weight:500}h1{font-size:28px;margin:0}.moon{width:42px;height:42px;border-radius:50%;border:1px solid #ffffff1a;background:var(--panel);font-size:22px}.hero{text-align:center;position:relative;z-index:1;padding-top:32px}.orb{width:190px;height:190px;border-radius:50%;margin:0 auto 25px;display:grid;place-items:center;position:relative;background:radial-gradient(circle at 35% 30%,#8478a8,#353047 52%,#151321 72%);box-shadow:0 25px 70px #0007,inset 0 0 0 1px #ffffff14}.orb:before,.orb:after{content:"";position:absolute;border:1px solid #c8baf02b;border-radius:50%}.orb:before{inset:12px}.orb:after{inset:29px}.orb span{font-family:Georgia,serif;font-size:42px;letter-spacing:.08em;color:#e7ddff;text-shadow:0 0 30px #a88df7}.playing{animation:breathe 4s ease-in-out infinite}@keyframes breathe{50%{transform:scale(1.035);box-shadow:0 25px 85px #9a7fde3d}}.count{color:var(--lav);font-size:10px;font-weight:700;letter-spacing:.2em;margin:0 0 8px}h2{font-size:29px;line-height:1.05;margin:0 auto 8px;max-width:330px}.sub{margin:0;color:var(--muted);font-size:12px}.timeline{margin:27px 5px 12px}.timeline input{width:100%;accent-color:var(--lav)}.times{display:flex;justify-content:space-between;color:#777286;font-size:10px}.transport{display:flex;align-items:center;justify-content:space-between;margin:4px auto 27px;max-width:355px}.transport button{border:0;background:none;min-width:42px;min-height:48px;font-size:27px}.transport .play{width:72px;height:72px;border-radius:50%;background:linear-gradient(145deg,#c9baf0,#947fc9);color:#191325;box-shadow:0 10px 32px #9d7de052;font-size:23px}.seek{font-size:13px!important;color:#aaa4bd}.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}.tools button{border:1px solid #ffffff12;background:var(--panel);border-radius:18px;min-height:104px;padding:13px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center}.icon{height:31px;color:var(--lav);font-size:24px}.tools b{font-size:11px;margin-top:7px}.tools small{font-size:9px;color:#767083;margin-top:4px}.queue{margin-top:31px;position:relative;z-index:1}.qhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;padding:0 3px}.qhead h3{font-size:23px;margin:0}.qhead>span{font-size:10px;color:#777286}.lesson{width:100%;border:0;border-bottom:1px solid #ffffff0d;background:transparent;display:flex;align-items:center;text-align:left;padding:14px 7px;gap:12px}.lesson.active{background:linear-gradient(90deg,#b199ea1c,transparent);border-radius:13px}.num{width:28px;height:28px;display:grid;place-items:center;border-radius:50%;color:#8d879c;background:#ffffff0d;font-size:11px}.active .num{color:#1a1424;background:var(--lav)}.meta{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}.meta b{font-family:Georgia,serif;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta small,.len{color:#777286;font-size:9px}@media(prefers-reduced-motion:reduce){.playing{animation:none}}
</style></head><body><main class="shell"><div class="aurora a1"></div><div class="aurora a2"></div><header><div><p class="eye">GOOD EVENING</p><h1>DreamLingo</h1></div><button class="moon" aria-label="夜间模式">☾</button></header><section class="hero"><div class="orb" id="orb"><span>DL</span></div><p class="count" id="count"></p><h2 id="title"></h2><p class="sub" id="sub"></p><div class="timeline"><input id="progress" aria-label="播放进度" type="range" min="0" value="0" step=".1"><div class="times"><span id="now">0:00</span><span id="total">0:00</span></div></div><div class="transport"><button id="prev" aria-label="上一课">‹</button><button id="back" class="seek">↶ 15</button><button id="play" class="play" aria-label="播放">▶</button><button id="forward" class="seek">15 ↷</button><button id="next" aria-label="下一课">›</button></div></section><section class="tools"><button id="repeat"><span class="icon">↻</span><b>全部循环</b><small>点击切换</small></button><button id="sleep"><span class="icon">☾</span><b>45 分钟</b><small>点击设置</small></button><button id="speed"><span class="icon" style="font-size:15px;font-weight:700">0.85×</span><b>播放速度</b><small>舒缓语速</small></button></section><section class="queue"><div class="qhead"><div><p class="eye">TONIGHT'S JOURNEY</p><h3>睡前英语</h3></div><span>3 lessons</span></div><div id="list"></div></section><audio id="audio" preload="metadata"></audio></main><script>
const lessons=[{title:'A Quiet Walk Through London',sub:'Evening story · RP English',len:'03:08',src:'public/audio/quiet-london.mp3'},{title:'The Art of a Proper Afternoon Tea',sub:'Culture · Posh British English',len:'02:42',src:'public/audio/afternoon-tea.mp3'},{title:'Rain at the Country House',sub:'Sleep story · Gentle RP English',len:'03:24',src:'public/audio/country-rain.mp3'}];let state={i:0,speed:.85,repeat:'all'},timer=null,remain=0;try{Object.assign(state,JSON.parse(localStorage.getItem('dreamlingo')||'{}'))}catch{}const $=id=>document.getElementById(id),audio=$('audio'),fmt=s=>`${Math.floor((s||0)/60)}:${Math.floor((s||0)%60).toString().padStart(2,'0')}`;function save(){localStorage.setItem('dreamlingo',JSON.stringify(state))}function render(){const l=lessons[state.i];$('count').textContent=`LESSON ${state.i+1} OF ${lessons.length}`;$('title').textContent=l.title;$('sub').textContent=l.sub;$('total').textContent=l.len;audio.src=l.src;audio.playbackRate=state.speed;$('speed').firstElementChild.textContent=state.speed+'×';$('list').innerHTML=lessons.map((x,i)=>`<button class="lesson ${i===state.i?'active':''}" data-i="${i}"><span class="num">${i+1}</span><span class="meta"><b>${x.title}</b><small>${x.sub}</small></span><span class="len">${x.len}</span></button>`).join('');document.querySelectorAll('.lesson').forEach(b=>b.onclick=()=>change(+b.dataset.i));save();if('mediaSession'in navigator)navigator.mediaSession.metadata=new MediaMetadata({title:l.title,artist:'DreamLingo · Posh British English',album:'Sleep English'})}async function toggle(){audio.paused?await audio.play():audio.pause()}function change(i,auto=false){state.i=(i+lessons.length)%lessons.length;render();if(auto)audio.play()}$('play').onclick=toggle;$('back').onclick=()=>audio.currentTime=Math.max(0,audio.currentTime-15);$('forward').onclick=()=>audio.currentTime=Math.min(audio.duration||0,audio.currentTime+15);$('prev').onclick=()=>change(state.i-1,!audio.paused);$('next').onclick=()=>change(state.i+1,!audio.paused);$('progress').oninput=e=>audio.currentTime=+e.target.value;audio.onloadedmetadata=()=>{$('progress').max=audio.duration;$('total').textContent=fmt(audio.duration);audio.playbackRate=state.speed};audio.ontimeupdate=()=>{$('progress').value=audio.currentTime;$('now').textContent=fmt(audio.currentTime)};audio.onplay=()=>{$('play').textContent='Ⅱ';$('orb').classList.add('playing')};audio.onpause=()=>{$('play').textContent='▶';$('orb').classList.remove('playing')};audio.onended=()=>state.repeat==='one'?audio.play():state.repeat==='all'||state.i<lessons.length-1?change(state.i+1,true):0;$('repeat').onclick=()=>{state.repeat=state.repeat==='all'?'one':state.repeat==='one'?'off':'all';$('repeat').children[1].textContent={all:'全部循环',one:'单曲循环',off:'不循环'}[state.repeat];save()};$('speed').onclick=()=>{state.speed=state.speed===1.25?.75:Math.round((state.speed+.25)*100)/100;audio.playbackRate=state.speed;$('speed').firstElementChild.textContent=state.speed+'×';save()};let opts=[0,15,30,45,60],sleep=45;$('sleep').onclick=()=>{sleep=opts[(opts.indexOf(sleep)+1)%opts.length];$('sleep').children[1].textContent=sleep?sleep+' 分钟':'定时关闭';clearTimeout(timer);if(sleep)timer=setTimeout(()=>audio.pause(),sleep*60000)};if('mediaSession'in navigator){navigator.mediaSession.setActionHandler('play',toggle);navigator.mediaSession.setActionHandler('pause',toggle);navigator.mediaSession.setActionHandler('previoustrack',()=>change(state.i-1,true));navigator.mediaSession.setActionHandler('nexttrack',()=>change(state.i+1,true))}render();
</script></body></html>
